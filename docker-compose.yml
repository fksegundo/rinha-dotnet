services:
  api1:
    image: ghcr.io/fksegundo/rinha-dotnet:latest
    pull_policy: always
    cpuset: "0"
    restart: always
    logging:
      driver: "none"
    environment:
      RINHA_RUNTIME: "event-loop"
      RINHA_FD_SOCKET: /sockets/api1.sock
      RINHA_INDEX_PATH: /app/index/rinha-specialist.idx
      RINHA_PRETOUCH_INDEX: "1"
      RINHA_MLOCK_INDEX: "1"
      RINHA_CLIENT_FD_PRECONFIGURED: "1"
      RINHA_THREAD_POOL_SIZE: "1"
      DOTNET_gcServer: "0"
      MALLOC_ARENA_MAX: "2"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "170M"

  api2:
    image: ghcr.io/fksegundo/rinha-dotnet:latest
    pull_policy: always
    cpuset: "1"
    restart: always
    network_mode: "none"
    logging:
      driver: "none"
    environment:
      RINHA_RUNTIME: "event-loop"
      RINHA_FD_SOCKET: /sockets/api1.sock
      RINHA_INDEX_PATH: /app/index/rinha-specialist.idx
      RINHA_PRETOUCH_INDEX: "1"
      RINHA_MLOCK_INDEX: "1"
      RINHA_CLIENT_FD_PRECONFIGURED: "1"
      RINHA_THREAD_POOL_SIZE: "1"
      DOTNET_gcServer: "0"
      MALLOC_ARENA_MAX: "2"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "170M"

  lb:
    image: ghcr.io/fksegundo/rinha-dotnet-lb:latest
    pull_policy: always
    cpuset: "2,3"
    restart: always
    user: "0:0"
    ports:
      - "9999:9999"
    logging:
      driver: "none"
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "6M"
    depends_on:
      - api1
      - api2

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=4m
