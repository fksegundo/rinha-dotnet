services:
  api1:
    image: rinha-dotnet-aot-api:local
    build:
      context: ..
      dockerfile: docker/Dockerfile
    pull_policy: never
    restart: always
    environment:
      RINHA_RUNTIME: "event-loop"
      RINHA_FD_SOCKET: /sockets/api1.sock
      RINHA_INDEX_PATH: /app/index/rinha-specialist.idx
      RINHA_PRETOUCH_INDEX: "1"
      RINHA_MLOCK_INDEX: "1"
      RINHA_CLIENT_FD_PRECONFIGURED: "1"
      RINHA_THREAD_POOL_SIZE: "1"
      DOTNET_gcServer: "0"
      MALLOC_ARENA_MAX: "2"
    cpuset: "0"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      memlock:
        soft: -1
        hard: -1
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "170M"

  api2:
    image: rinha-dotnet-aot-api:local
    build:
      context: ..
      dockerfile: docker/Dockerfile
    pull_policy: never
    restart: always
    network_mode: "none"
    environment:
      RINHA_RUNTIME: "event-loop"
      RINHA_FD_SOCKET: /sockets/api2.sock
      RINHA_INDEX_PATH: /app/index/rinha-specialist.idx
      RINHA_PRETOUCH_INDEX: "1"
      RINHA_MLOCK_INDEX: "1"
      RINHA_CLIENT_FD_PRECONFIGURED: "1"
      RINHA_THREAD_POOL_SIZE: "1"
      DOTNET_gcServer: "0"
      MALLOC_ARENA_MAX: "2"
    cpuset: "1"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      memlock:
        soft: -1
        hard: -1
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "170M"

  lb:
    image: rinha-dotnet-lb:local
    build:
      context: ..
      dockerfile: docker/Dockerfile.lb
    pull_policy: never
    restart: always
    user: "0:0"
    ports:
      - "9999:9999"
    cpuset: "2,3"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "10M"
    depends_on:
      - api1
      - api2

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=10m
