name: CI

on:
  push:
  pull_request:

jobs:
  format-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Format
        run: dotnet format --verify-no-changes

      - name: Test
        run: dotnet test -c Release --no-restore
